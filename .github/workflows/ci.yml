name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, types, i18n, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint (full repo, informational)
        run: npm run lint
        continue-on-error: true

      - name: Lint changed TypeScript files (gate)
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only --diff-filter=ACMRT origin/main...HEAD -- '*.ts' '*.tsx' || true)
          if [ -z "$CHANGED" ]; then
            echo "No TypeScript files changed — skipping scoped lint gate."
            exit 0
          fi
          echo "Linting changed files:"
          echo "$CHANGED"
          npx eslint $CHANGED
      - run: npx tsc --noEmit
      - run: npm run i18n:check
      - run: npm run test:unit

  e2e:
    name: Playwright E2E + visual regression
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
      - run: npm run test:visual

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7