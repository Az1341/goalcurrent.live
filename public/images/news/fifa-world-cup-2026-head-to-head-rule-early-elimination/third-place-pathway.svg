<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="pathTitle">
  <title id="pathTitle">Diagram showing group stage and third-place qualification pathway at World Cup 2026</title>
  <rect width="960" height="360" fill="#f8fafc" rx="16"/>
  <text x="480" y="38" text-anchor="middle" fill="#041e42" font-size="20" font-weight="700">Two Parallel Stories in 2026</text>
  <rect x="48" y="64" width="400" height="250" rx="12" fill="#fff" stroke="#7b0d1e"/>
  <text x="248" y="96" text-anchor="middle" fill="#7b0d1e" font-size="16" font-weight="700">Inside the group</text>
  <text x="72" y="132" fill="#334155" font-size="15">" Head-to-head can seal a duel early</text>
  <text x="72" y="164" fill="#334155" font-size="15">" Direct defeats carry more weight</text>
  <text x="72" y="196" fill="#334155" font-size="15">" Matchday three may mean less for some teams</text>
  <rect x="512" y="64" width="400" height="250" rx="12" fill="#fff" stroke="#041e42"/>
  <text x="712" y="96" text-anchor="middle" fill="#041e42" font-size="16" font-weight="700">Across the tournament</text>
  <text x="536" y="132" fill="#334155" font-size="15">" 12 groups, top two advance</text>
  <text x="536" y="164" fill="#334155" font-size="15">" 8 best third-placed teams also qualify</text>
  <text x="536" y="196" fill="#334155" font-size="15">" Finishing third is not automatically fatal</text>
  <text x="480" y="332" text-anchor="middle" fill="#64748b" font-size="14">The expanded format keeps hope alive in one lane while head-to-head narrows it in another.</text>
</svg>
