<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="tableTitle">
  <title id="tableTitle">Illustrative group table showing early mathematical elimination under head-to-head rules</title>
  <rect width="960" height="420" fill="#f8fafc" rx="16"/>
  <text x="48" y="42" fill="#041e42" font-size="20" font-weight="700">Illustrative Group Table  After Two Matches</text>
  <text x="48" y="68" fill="#64748b" font-size="14">Hypothetical example for editorial explanation only (not live tournament data)</text>
  <rect x="48" y="88" width="864" height="40" fill="#041e42"/>
  <text x="72" y="114" fill="#fff" font-size="14" font-weight="700">Team</text>
  <text x="360" y="114" fill="#fff" font-size="14" font-weight="700">P</text>
  <text x="430" y="114" fill="#fff" font-size="14" font-weight="700">GD</text>
  <text x="520" y="114" fill="#fff" font-size="14" font-weight="700">H2H vs rival</text>
  <text x="700" y="114" fill="#fff" font-size="14" font-weight="700">Status</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">
    <rect x="48" y="128" width="864" height="48" fill="#fff" stroke="#e2e8f0"/>
    <text x="72" y="158">Team A</text><text x="360" y="158">6</text><text x="430" y="158">+4</text><text x="520" y="158">Beat Team B</text><text x="700" y="158" fill="#166534" font-weight="700">Can clinch top two</text>
    <rect x="48" y="176" width="864" height="48" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="72" y="206">Team B</text><text x="360" y="206">0</text><text x="430" y="206">-2</text><text x="520" y="206">Lost to Team A</text><text x="700" y="206" fill="#7b0d1e" font-weight="700">H2H path closed vs A</text>
    <rect x="48" y="224" width="864" height="48" fill="#fff" stroke="#e2e8f0"/>
    <text x="72" y="254">Team C</text><text x="360" y="254">3</text><text x="430" y="254">+1</text><text x="520" y="254">Not yet played B</text><text x="700" y="254">Still alive for points</text>
    <rect x="48" y="272" width="864" height="48" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="72" y="302">Team D</text><text x="360" y="302">3</text><text x="430" y="302">-3</text><text x="520" y="302"></text><text x="700" y="302">Third-place race possible</text>
  </g>
  <text x="48" y="368" fill="#475569" font-size="14">Team B may still play match three, but if Team A is unreachable on head-to-head, goal difference may never matter in that duel.</text>
</svg>
