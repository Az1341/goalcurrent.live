<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Premier League 2026-27 season countdown editorial graphic</title>
  <desc id="heroDesc">Original GoalCurrent.live graphic for the Premier League 2026-27 season preview as the World Cup knockout stage continues</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="45%" stop-color="#38003c"/>
      <stop offset="100%" stop-color="#c8102e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="130" r="170" fill="#ffffff" opacity="0.04"/>
  <circle cx="200" cy="600" r="200" fill="#ffffff" opacity="0.03"/>
  <g transform="translate(900 230)">
    <ellipse cx="0" cy="150" rx="85" ry="18" fill="#000" opacity="0.25"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <path d="M-50 20 L-20 -45 L20 -45 L50 20 Z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#f5d76e" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">PL</text>
  </g>
  <text x="72" y="120" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="0.08em">PREMIER LEAGUE &#183; PREVIEW</text>
  <text x="72" y="210" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">Six Weeks to</text>
  <text x="72" y="280" fill="#f5d76e" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">Kick-Off 26/27</text>
  <text x="72" y="360" fill="rgba(255,255,255,0.82)" font-family="Segoe UI, Arial, sans-serif" font-size="26">Arsenal defend &#183; City, Liverpool and Chelsea chase</text>
  <rect x="72" y="420" width="500" height="4" fill="#f5d76e" opacity="0.8"/>
  <text x="72" y="470" fill="rgba(255,255,255,0.7)" font-family="Segoe UI, Arial, sans-serif" font-size="20">GoalCurrent.live editorial &#183; 1 July 2026</text>
