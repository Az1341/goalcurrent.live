<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0508"/>
      <stop offset="55%" stop-color="#3a0a10"/>
      <stop offset="100%" stop-color="#0d0304"/>
    </linearGradient>
    <linearGradient id="pitchFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3d1e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f3d1e" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e30613" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e30613" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- floodlight beams -->
  <g opacity="0.18">
    <polygon points="80,0 260,0 200,630 40,630" fill="#ffffff"/>
    <polygon points="1120,0 940,0 1000,630 1160,630" fill="#ffffff"/>
  </g>

  <!-- floodlight towers -->
  <g fill="#efe6e2">
    <rect x="60" y="20" width="10" height="120"/>
    <rect x="20" y="10" width="90" height="18" rx="3"/>
    <rect x="1130" y="20" width="10" height="120"/>
    <rect x="1090" y="10" width="90" height="18" rx="3"/>
  </g>

  <!-- pitch band at bottom -->
  <rect x="0" y="470" width="1200" height="160" fill="url(#pitchFade)"/>
  <g stroke="#ffffff" stroke-opacity="0.25" stroke-width="3" fill="none">
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <circle cx="600" cy="600" r="70"/>
    <line x1="600" y1="530" x2="600" y2="630"/>
  </g>

  <!-- flag accent stripes: England (red/white) left, France (blue/white/red) right -->
  <g opacity="0.9">
    <rect x="0" y="0" width="14" height="630" fill="#C8102E"/>
    <rect x="14" y="0" width="6" height="630" fill="#ffffff"/>
  </g>
  <g opacity="0.9">
    <rect x="1180" y="0" width="7" height="630" fill="#0055A4"/>
    <rect x="1187" y="0" width="6" height="630" fill="#ffffff"/>
    <rect x="1193" y="0" width="7" height="630" fill="#EF4135"/>
  </g>

  <!-- ball graphic -->
  <g transform="translate(600,235)">
    <circle r="55" fill="#f5f0ec" stroke="#1a0508" stroke-width="3"/>
    <polygon points="0,-24 20,-8 12,17 -12,17 -20,-8" fill="#1a0508"/>
    <line x1="0" y1="-55" x2="0" y2="-24" stroke="#1a0508" stroke-width="3"/>
    <line x1="46" y1="-27" x2="20" y2="-8" stroke="#1a0508" stroke-width="3"/>
    <line x1="46" y1="27" x2="12" y2="17" stroke="#1a0508" stroke-width="3"/>
    <line x1="0" y1="55" x2="-12" y2="17" stroke="#1a0508" stroke-width="3"/>
    <line x1="-46" y1="27" x2="-20" y2="-8" stroke="#1a0508" stroke-width="3"/>
    <line x1="-46" y1="-27" x2="0" y2="-24" stroke="#1a0508" stroke-width="3"/>
  </g>

  <!-- text -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" letter-spacing="6" fill="#e30613" font-weight="700">THIRD-PLACE PLAYOFF</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="58" fill="#ffffff" font-weight="800">ENGLAND vs FRANCE</text>
  <text x="600" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#efe6e2" opacity="0.85">Miami Stadium · Saturday 18 July 2026 · 10:00 PM BST</text>

  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" letter-spacing="3" fill="#ffffff" opacity="0.6">GOALCURRENT.LIVE</text>
</svg>
