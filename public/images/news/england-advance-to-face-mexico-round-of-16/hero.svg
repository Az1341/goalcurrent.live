<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">England vs Mexico World Cup 2026 round of 16 preview editorial graphic</title>
  <desc id="heroDesc">Original GoalCurrent.live graphic for England advancing to face Mexico in the FIFA World Cup 2026 Round of 16</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#c8102e"/>
      <stop offset="70%" stop-color="#006847"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
